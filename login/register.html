<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <link rel="stylesheet" href="style2.css">
  <style>
    .rules-list {
      text-align: left;
      font-size: 12px;
      color: #ccc;
      margin: 10px 0 20px 0;
      padding-left: 20px;
      line-height: 1.5;
    }
    .error-msg {
      color: #ef4444;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>AES Register</h1>

  <input type="text" id="user" placeholder="Username (Tối thiểu 4 ký tự)">

  <input type="password" id="pass" placeholder="Password">
  
  <input type="password" id="confirm_pass" placeholder="Confirm Password">

  <ul class="rules-list">
    <li>Username: Chỉ gồm chữ/số, không khoảng trắng, ≥ 4 ký tự.</li>
    <li>Mật khẩu: ≥ 8 ký tự.</li>
    <li>Mật khẩu phải chứa chữ hoa, chữ thường và số.</li>
  </ul>
  
  <div id="error_text" class="error-msg"></div>

  <button onclick="register()">Đăng ký</button>

  <p>
    Đã có tài khoản?
    <a href="login.html">Đăng nhập</a>
  </p>

</div>

<script src="login.js"></script>

</body>
</html>
